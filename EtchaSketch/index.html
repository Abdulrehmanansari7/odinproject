<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtchaSketch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="board"></div>
        <div class="sizeButtons">
            <button class="sizeButton" data-size="16">16x16</button>
            <button class="sizeButton" data-size="32">32x32</button>
            <button class="sizeButton" data-size="64">64x64</button>
        </div>
        <div class="colorbtns">
            <button class="clrbtn">RED</button>
            <button class="clrbtn">BLUE</button>
            <button class="clrbtn">GREEN</button>
            <button class="clrbtn">WHITE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
